<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StreamBoss — Fast Streaming</title>
    <meta name="theme-color" content="#0a0c12">
    
    <link rel="icon" type="image/jpeg" href="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/logo.png">
    
    <!-- Vidstack Player -->
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <script type="module" src="https://cdn.vidstack.io/player"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0b0e17, #03050a);
            font-family: system-ui, -apple-system, sans-serif;
            color: #edeef2;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .file-badge { background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; }
        .player-card { background: rgba(10,14,23,0.7); backdrop-filter: blur(16px); border-radius: 1.5rem; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
        media-player { border-radius: 1rem; overflow: hidden; }
        .actions { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin: 1.5rem 0; }
        .btn { background: rgba(20,28,40,0.9); border: 1px solid rgba(255,255,255,0.2); padding: 0.7rem 1.5rem; border-radius: 50px; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2563eb; border-color: #3b82f6; }
        .btn:hover { transform: translateY(-2px); background: #1e293b; }
        .players-panel { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.5rem; margin: 1.5rem 0; border: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; color: #9ca3cf; }
        .player-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; }
        .player-link { background: rgba(255,255,255,0.05); padding: 0.5rem 1.2rem; border-radius: 40px; font-size: 0.85rem; text-decoration: none; color: #e2e8ff; border: 1px solid rgba(255,255,255,0.15); transition: 0.2s; }
        .player-link:hover { background: #2563eb; color: white; }
        .social { display: flex; justify-content: center; gap: 1.5rem; margin: 2rem 0 1rem; }
        .social-link { background: rgba(255,255,255,0.05); padding: 0.5rem 1.5rem; border-radius: 50px; text-decoration: none; color: #cdd9ff; display: inline-flex; align-items: center; gap: 8px; }
        .footer { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.75rem; color: #7c85ac; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2a48; padding: 0.7rem 1.2rem; border-radius: 50px; font-size: 0.85rem; z-index: 999; border-left: 3px solid #3b82f6; }
        @media (max-width: 600px) { body { padding: 1rem; } .logo { font-size: 1.3rem; } .btn span { display: none; } .btn { padding: 0.7rem 1rem; } }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <div class="brand">
            <div class="logo">🎬 STREAM BOSS</div>
            <div class="file-badge" id="fileBadge">Loading...</div>
        </div>
        <button class="btn" id="themeToggle">🌙 Theme</button>
    </div>

    <div class="player-card">
        <media-player id="player" title="Stream" playsinline keyTarget="document" preload="auto">
            <media-provider></media-provider>
            <media-video-layout></media-video-layout>
        </media-player>
    </div>

    <div class="actions">
        <a href="#" id="downloadBtn" class="btn btn-primary">📥 Download</a>
        <button class="btn" id="copyBtn">🔗 Copy Link</button>
        <button class="btn" id="speedBtn">⚡ Speed 1x</button>
        <button class="btn" id="audioBtn">🔊 Audio Boost</button>
    </div>

    <div class="players-panel">
        <div class="section-title">📱 EXTERNAL PLAYERS</div>
        <div class="player-grid" id="androidGrid"></div>
        <div class="player-grid" id="iosGrid"></div>
        <div class="player-grid" id="desktopGrid"></div>
    </div>

    <div class="social">
        <a href="https://t.me/streamboss_official" target="_blank" class="social-link">📨 Telegram Channel</a>
        <a href="#" id="githubLink" class="social-link">🐙 GitHub</a>
    </div>

    <div class="footer">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 1rem;">
            <span><kbd style="background:#1e2438; padding:2px 8px; border-radius:6px;">Space</kbd> Play/Pause</span>
            <span><kbd style="background:#1e2438; padding:2px 8px; border-radius:6px;">←→</kbd> Seek</span>
            <span><kbd style="background:#1e2438; padding:2px 8px; border-radius:6px;">↑↓</kbd> Volume</span>
            <span><kbd style="background:#1e2438; padding:2px 8px; border-radius:6px;">F</kbd> Fullscreen</span>
        </div>
        <div>⚡ Fast Stream · <span id="year"></span> Stream Boss</div>
    </div>
</div>

<script>
(function() {
    // ========== FIX: Get data from URL params or use defaults ==========
    let videoSrc = '';
    let fileName = '';
    
    // Try to get from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    videoSrc = urlParams.get('src') || urlParams.get('url') || '';
    fileName = urlParams.get('file') || urlParams.get('name') || 'Video File';
    
    // If still empty, try to read from hash or localStorage
    if (!videoSrc && window.location.hash) {
        videoSrc = window.location.hash.substring(1);
    }
    
    // Default demo video if nothing provided (prevents error)
    if (!videoSrc) {
        videoSrc = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
        fileName = 'Sample Video';
    }
    
    // Decode if needed
    videoSrc = decodeURIComponent(videoSrc);
    fileName = decodeURIComponent(fileName);
    
    // Update UI
    document.getElementById('fileBadge').innerHTML = `🎬 <span style="color:#60a5fa;">${fileName}</span>`;
    document.title = `StreamBoss - ${fileName}`;
    
    // Set video source
    const player = document.getElementById('player');
    if (player && videoSrc) {
        player.setAttribute('src', videoSrc);
    }
    
    // Download button
    const downloadBtn = document.getElementById('downloadBtn');
    if (downloadBtn && videoSrc) {
        downloadBtn.href = videoSrc;
        downloadBtn.setAttribute('download', fileName);
    } else if (downloadBtn) {
        downloadBtn.href = '#';
        downloadBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showToast('⚠️ No video source available');
        });
    }
    
    // Copy link
    const copyBtn = document.getElementById('copyBtn');
    function showToast(msg) {
        const old = document.querySelector('.toast');
        if(old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    if (copyBtn) {
        copyBtn.addEventListener('click', () => {
            if (videoSrc) {
                navigator.clipboard.writeText(videoSrc);
                showToast('✅ Link copied!');
            } else {
                showToast('❌ No link available');
            }
        });
    }
    
    // Speed control
    const speedBtn = document.getElementById('speedBtn');
    let speedIndex = 0;
    const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
    if (speedBtn) {
        speedBtn.addEventListener('click', () => {
            const video = document.querySelector('video');
            if (video) {
                speedIndex = (speedIndex + 1) % speeds.length;
                video.playbackRate = speeds[speedIndex];
                speedBtn.innerHTML = `⚡ ${speeds[speedIndex]}x`;
                showToast(`Speed: ${speeds[speedIndex]}x`);
            }
        });
    }
    
    // Audio boost
    const audioBtn = document.getElementById('audioBtn');
    if (audioBtn) {
        audioBtn.addEventListener('click', () => {
            const video = document.querySelector('video');
            if (video) {
                let newVol = Math.min(1, video.volume + 0.2);
                video.volume = newVol;
                showToast(`🔊 Volume: ${Math.round(newVol * 100)}%`);
            }
        });
    }
    
    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    let isDark = true;
    if (themeBtn) {
        themeBtn.addEventListener('click', () => {
            if (isDark) {
                document.body.style.background = '#f0f2f5';
                document.body.style.color = '#1a1a2e';
                isDark = false;
                themeBtn.innerHTML = '☀️ Light';
            } else {
                document.body.style.background = 'radial-gradient(circle at 20% 30%, #0b0e17, #03050a)';
                document.body.style.color = '#edeef2';
                isDark = true;
                themeBtn.innerHTML = '🌙 Theme';
            }
        });
    }
    
    // External players - Android
    const androidGrid = document.getElementById('androidGrid');
    const androidPlayers = ['VLC', 'MX Player', 'Next Player', 'MPV'];
    if (androidGrid && videoSrc) {
        androidPlayers.forEach(name => {
            const a = document.createElement('a');
            let intentUrl = '';
            if (name === 'VLC') intentUrl = `intent://${videoSrc.replace(/^https?:\/\//, '')}#Intent;action=android.intent.action.VIEW;type=video/*;package=org.videolan.vlc;end`;
            else if (name === 'MX Player') intentUrl = `intent://${videoSrc.replace(/^https?:\/\//, '')}#Intent;action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;end`;
            else intentUrl = videoSrc;
            a.href = intentUrl;
            a.className = 'player-link';
            a.innerText = name;
            a.target = '_blank';
            androidGrid.appendChild(a);
        });
    }
    
    // iOS players
    const iosGrid = document.getElementById('iosGrid');
    const iosPlayers = ['VLC', 'Infuse', 'nPlayer'];
    if (iosGrid && videoSrc) {
        iosPlayers.forEach(name => {
            const a = document.createElement('a');
            let url = '';
            if (name === 'VLC') url = `vlc-x-callback://x-callback-url/stream?url=${encodeURIComponent(videoSrc)}`;
            else if (name === 'Infuse') url = `infuse://x-callback-url/play?url=${encodeURIComponent(videoSrc)}`;
            else url = videoSrc;
            a.href = url;
            a.className = 'player-link';
            a.innerText = name;
            a.target = '_blank';
            iosGrid.appendChild(a);
        });
    }
    
    // Desktop players
    const desktopGrid = document.getElementById('desktopGrid');
    const desktopPlayers = ['VLC', 'MPV', 'PotPlayer'];
    if (desktopGrid && videoSrc) {
        desktopPlayers.forEach(name => {
            const a = document.createElement('a');
            let url = '';
            if (name === 'VLC') url = `vlc://${videoSrc}`;
            else if (name === 'MPV') url = `mpv://${videoSrc}`;
            else url = videoSrc;
            a.href = url;
            a.className = 'player-link';
            a.innerText = name;
            a.target = '_blank';
            desktopGrid.appendChild(a);
        });
    }
    
    // GitHub link
    const githubLink = document.getElementById('githubLink');
    if (githubLink) {
        githubLink.href = 'https://github.com/fyaz05/FileToLink';
    }
    
    // Year
    document.getElementById('year').innerText = new Date().getFullYear();
    
    // Auto play attempt
    setTimeout(() => {
        const video = document.querySelector('video');
        if (video) video.play().catch(e => console.log('Autoplay prevented:', e));
    }, 1000);
})();
</script>
</body>
    </html>
